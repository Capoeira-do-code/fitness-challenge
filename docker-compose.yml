services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitness-app
    restart: unless-stopped
    environment:
      APP_NAME: Fitness Challenge Tracker
      APP_TIMEZONE: Europe/Madrid
      APP_DEFAULT_LOCALE: en
      SESSION_NAME: fitness_challenge_session
      DB_PATH: ${DB_PATH:-/var/www/storage/fitness.sqlite}
      PHOTO_UPLOAD_MAX_BYTES: ${PHOTO_UPLOAD_MAX_BYTES:-15728640}
      CHALLENGE_START: 2026-04-13
      CHALLENGE_END: 2026-06-07
      SEED_PASSWORD: ChangeMe123!
    volumes:
      - ./storage:/var/www/storage
      - ./public/uploads:/var/www/public/uploads:ro

  web:
    image: nginx:1.27-alpine
    container_name: fitness-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./public:/var/www/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
